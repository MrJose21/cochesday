<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilla Auto Spa | Catálogo de Exclusividad</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        :root {
            --color-mostaza: #d1b464;
            --color-negro: #000000;
            --color-gris-oscuro: #121212;
            --color-texto-blanco: #ffffff;
            --font-main: 'Georgia', serif;
        }

        body { font-family: var(--font-main); margin: 0; background-color: var(--color-negro); color: var(--color-texto-blanco); overflow-x: hidden; }

        /* NAV */
        nav {
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 3px solid var(--color-mostaza);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-minimal-brilla {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; text-decoration: none;
        }

        .svg-carrito-dorado { fill: var(--color-mostaza); width: 45px; height: auto; }
        .text-brilla-nav { font-size: 1.1rem; color: var(--color-mostaza); font-weight: bold; letter-spacing: 1px; margin: 0; }
        .text-autospa-nav { font-size: 0.6rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin: -2px 0 0 0; }

        /* CATALOGO */
        .seccion-autos { padding: 40px 20px; max-width: 1300px; margin: auto; }
        .contenedor-autos { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        
        .tarjeta-auto { background: var(--color-gris-oscuro); border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .tarjeta-auto:hover { transform: translateY(-5px); border-color: var(--color-mostaza); }
        .tarjeta-auto img { width: 100%; height: 230px; object-fit: cover; border-bottom: 2px solid var(--color-mostaza); cursor: pointer; }
        
        .info-auto { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .marca-modelo { font-size: 1.4rem; color: var(--color-mostaza); margin: 0 0 10px 0; font-weight: bold; }
        
        /* FOOTER DE LA TARJETA (Novedad) */
        .card-footer-action { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid #333; }
        .precio-auto { font-size: 1.6rem; font-weight: bold; color: white; }
        .btn-interesa-whatsapp { background: #25d366; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-interesa-whatsapp:hover { background: #128c7e; transform: scale(1.05); }

        /* GALERIA EN MODAL */
        .galeria-contenedor { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scroll-snap-type: x mandatory; }
        .galeria-contenedor img { height: 400px; scroll-snap-align: center; border-radius: 8px; flex-shrink: 0; }

        /* CONTACTO Y PROMO */
        .hex-icon { width: 40px; height: 40px; border: 2px solid var(--color-mostaza); display: flex; align-items: center; justify-content: center; margin-right: 15px; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); background: #000; }
        .banner-promo { background-color: var(--color-mostaza); padding: 30px; border-radius: 10px; color: #000; flex: 1; min-width: 300px; text-align: center; }

        /* BOTONES ADMIN */
        .btn-borrar-card { position: absolute; top: 10px; right: 10px; background: rgba(255, 0, 0, 0.9); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 10; }
        .area-login-nav button { background: var(--color-mostaza); color: black; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #111; margin: 2% auto; padding: 30px; border: 1px solid var(--color-mostaza); width: 90%; max-width: 1000px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-minimal-brilla">
            <svg class="svg-carrito-dorado" viewBox="0 0 512 512"><path d="M472.1,348.6c13.7,0,24.8-11.1,24.8-24.8V188.2c0-13.7-11.1-24.8-24.8-24.8H188.2c-13.7,0-24.8,11.1-24.8,24.8v135.6c0,13.7,11.1,24.8,24.8,24.8h60v50H60c-13.7,0-24.8,11.1-24.8,24.8v50c0,13.7,11.1,24.8,24.8,24.8h400c13.7,0,24.8-11.1,24.8-24.8v-50c0-13.7-11.1-24.8-24.8-24.8h-70v-50C472.1,348.6,472.1,348.6,472.1,348.6z M188.2,188.2h283.9v135.6H188.2V188.2z M60,400h400v50H60V400z M273.9,348.6h100v50h-100V348.6z"/></svg>
            <p class="text-brilla-nav">BRILLA AUTO SPA</p>
        </div>
        <div class="area-login-nav">
            <button id="btn-nueva-pub" style="display:none;" onclick="document.getElementById('modal-crear').style.display='block'">+ Nueva Venta</button>
            <button id="btn-admin-nav" onclick="login()">Acceso Owner</button>
        </div>
    </nav>

    <div class="seccion-autos">
        <h2 style="text-align:center; color:var(--color-mostaza); text-transform:uppercase; letter-spacing:4px;">Catálogo Exclusivo</h2>
        <div id="grid-autos" class="contenedor-autos"></div>
    </div>

    <section style="background-color: var(--color-gris-oscuro); border-top: 1px solid var(--color-mostaza); padding: 50px 20px;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 40px;">
            <div style="flex: 1; min-width: 300px;">
                <h3 style="color: var(--color-mostaza);">CONTACT US:</h3>
                <div style="display: flex; align-items: center; margin-bottom: 20px;">
                    <div class="hex-icon"><i class="fas fa-map-marker-alt" style="color: var(--color-mostaza);"></i></div>
                    <p>Dumfries and surrounding areas</p>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="hex-icon"><i class="fas fa-envelope" style="color: var(--color-mostaza);"></i></div>
                    <p>brillautospa@gmail.com</p>
                </div>
            </div>
            <div class="banner-promo">
                <h2>Get $15 OFF your first full detail service!</h2>
            </div>
        </div>
    </section>

    <div id="modal-crear" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--color-mostaza);">Publicar Vehículo</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div style="grid-column: span 2;">
                    <label>Subir Imágenes (Puedes seleccionar varias)</label>
                    <input type="file" id="new-fotos" multiple accept="image/*" style="width:100%; margin-top:10px;">
                </div>
                <input type="text" id="new-titulo" placeholder="Nombre del Vehículo">
                <input type="text" id="new-precio" placeholder="Precio ($)">
                <textarea id="new-desc" placeholder="Descripción breve" style="grid-column: span 2; height:80px;"></textarea>
                <input type="text" id="new-modelo" placeholder="Año">
                <input type="text" id="new-motor" placeholder="Motor">
            </div>
            <button onclick="crearPublicacion()" style="width:100%; margin-top:20px; padding:15px; background:var(--color-mostaza); border:none; font-weight:bold; cursor:pointer;">SUBIR AL CATÁLOGO</button>
            <button onclick="document.getElementById('modal-crear').style.display='none'" style="width:100%; margin-top:10px; background:transparent; border:1px solid #444; color:white; padding:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="modal-detalles" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:2rem;" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div>

    <script>
        let esOwner = false;
        let catalogo = JSON.parse(localStorage.getItem('brilla_v3')) || {};

        function login() {
            let pass = prompt("Introduzca la clave de seguridad:");
            if(pass === "POTOMAC2026") {
                esOwner = true;
                document.getElementById('btn-nueva-pub').style.display = 'block';
                document.getElementById('btn-admin-nav').innerHTML = "DAY ROJAS";
                renderizar();
            }
        }

        async function crearPublicacion() {
            const files = document.getElementById('new-fotos').files;
            const promesasImgs = Array.from(files).map(file => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });

            const imagenesCargadas = await Promise.all(promesasImgs);
            const id = "auto_" + Date.now();
            
            catalogo[id] = {
                titulo: document.getElementById('new-titulo').value,
                precio: document.getElementById('new-precio').value,
                descripcion: document.getElementById('new-desc').value,
                modelo: document.getElementById('new-modelo').value,
                motor: document.getElementById('new-motor').value,
                fotos: imagenesCargadas.length > 0 ? imagenesCargadas : ['https://via.placeholder.com/800x500']
            };

            localStorage.setItem('brilla_v3', JSON.stringify(catalogo));
            document.getElementById('modal-crear').style.display = 'none';
            renderizar();
        }

        function renderizar() {
            const grid = document.getElementById('grid-autos');
            grid.innerHTML = "";
            Object.keys(catalogo).reverse().forEach(id => {
                const auto = catalogo[id];
                const msgWhatsapp = `Hola Brilla Auto Spa, me interesa el ${auto.titulo}`;
                const urlWa = `https://wa.me/1234567890?text=${encodeURIComponent(msgWhatsapp)}`;

                grid.innerHTML += `
                    <div class="tarjeta-auto">
                        ${esOwner ? `<button class="btn-borrar-card" onclick="borrar('${id}')">BORRAR</button>` : ''}
                        <img src="${auto.fotos[0]}" onclick="abrirDetalle('${id}')">
                        <div class="info-auto">
                            <p class="marca-modelo">${auto.titulo}</p>
                            <p style="font-size:0.8rem; color:#888;">${auto.motor} | ${auto.modelo}</p>
                            <div class="card-footer-action">
                                <div class="precio-auto">${auto.precio}</div>
                                <a href="${urlWa}" target="_blank" class="btn-interesa-whatsapp">
                                    <i class="fab fa-whatsapp"></i> ME INTERESA
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function abrirDetalle(id) {
            const auto = catalogo[id];
            let galeriaHtml = `<div class="galeria-contenedor">`;
            auto.fotos.forEach(f => galeriaHtml += `<img src="${f}">`);
            galeriaHtml += `</div>`;

            document.getElementById('contenido-modal').innerHTML = `
                <h2 style="color:var(--color-mostaza); margin-bottom:10px;">${auto.titulo}</h2>
                ${galeriaHtml}
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                    <div>
                        <h3 style="color:var(--color-mostaza);">Descripción</h3>
                        <p>${auto.descripcion}</p>
                    </div>
                    <div style="background:#1a1a1a; padding:20px; border-radius:10px;">
                        <h3 style="margin-top:0;">Ficha Técnica</h3>
                        <p><strong>Año:</strong> ${auto.modelo}</p>
                        <p><strong>Motor:</strong> ${auto.motor}</p>
                        <p style="font-size:1.8rem; color:var(--color-mostaza); font-weight:bold;">${auto.precio}</p>
                    </div>
                </div>`;
            document.getElementById('modal-detalles').style.display = 'block';
        }

        function borrar(id) {
            if(confirm("¿Eliminar publicación?")) {
                delete catalogo[id];
                localStorage.setItem('brilla_v3', JSON.stringify(catalogo));
                renderizar();
            }
        }

        renderizar();
    </script>
</body>
</html>
