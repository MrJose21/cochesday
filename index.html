<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilla Auto Spa | Catálogo de Exclusividad</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        :root {
            --color-mostaza: #d1b464;
            --color-negro: #000000;
            --color-gris-oscuro: #121212;
            --color-texto-blanco: #ffffff;
            --font-main: 'Georgia', serif;
        }

        body { font-family: var(--font-main); margin: 0; background-color: var(--color-negro); color: var(--color-texto-blanco); overflow-x: hidden; }

        /* NAV ESTILO ORIGINAL */
        nav {
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 3px solid var(--color-mostaza);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-minimal-brilla {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; text-decoration: none; filter: drop-shadow(0 0 5px rgba(209, 180, 100, 0.4));
        }

        .svg-carrito-dorado { fill: var(--color-mostaza); width: 50px; height: auto; }
        .text-brilla-nav { font-size: 1.1rem; color: var(--color-mostaza); font-weight: bold; letter-spacing: 1px; margin: 0; font-family: 'Times New Roman', Times, serif; }
        .text-autospa-nav { font-size: 0.6rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin: -2px 0 0 0; }

        .area-login-nav { display: flex; align-items: center; gap: 10px; }
        #user-greeting { display: none; color: var(--color-mostaza); font-weight: bold; font-size: 0.85rem; }
        #btn-nueva-pub { display: none; background: var(--color-mostaza); color: black; border: none; padding: 6px 12px; font-size: 11px; border-radius: 3px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center;
            height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 1px solid var(--color-mostaza);
        }
        .hero h1 { font-size: 3rem; text-transform: uppercase; margin: 0; }
        .hero p { color: var(--color-mostaza); letter-spacing: 2px; }

        /* CATALOGO */
        .seccion-autos { padding: 60px 20px; max-width: 1300px; margin: auto; }
        .contenedor-autos { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .tarjeta-auto { background: var(--color-gris-oscuro); border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .tarjeta-auto:hover { transform: translateY(-10px); border-color: var(--color-mostaza); box-shadow: 0 10px 20px rgba(209, 180, 100, 0.1); }
        .tarjeta-auto img { width: 100%; height: 230px; object-fit: cover; border-bottom: 2px solid var(--color-mostaza); cursor: pointer; }
        
        .info-auto { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .marca-modelo { font-size: 1.4rem; color: var(--color-mostaza); margin-bottom: 8px; font-weight: bold; }
        
        /* BOTÓN WHATSAPP EN PREVIEW */
        .card-action-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; }
        .btn-wa-preview { background: #25d366; color: white; border: none; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* GALERIA MODAL */
        .slider-fotos { display: flex; overflow-x: auto; gap: 10px; scroll-snap-type: x mandatory; margin-bottom: 20px; padding-bottom: 10px; }
        .slider-fotos img { height: 400px; scroll-snap-align: center; border-radius: 8px; border: 1px solid #333; }

        /* CONTACTO Y PROMO */
        .hex-icon { width: 40px; height: 40px; border: 2px solid var(--color-mostaza); display: flex; align-items: center; justify-content: center; margin-right: 15px; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); background: #000; }
        .banner-promo { background-color: var(--color-mostaza); padding: 30px; border-radius: 10px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; text-align: center; color: #000; flex: 1; min-width: 300px; }

        /* LOGIN OVERLAY */
        .login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 3000; justify-content: center; align-items: center; }
        .login-box { background: #000; padding: 40px; border: 2px solid var(--color-mostaza); border-radius: 10px; text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid var(--color-mostaza); color: white; border-radius: 5px; box-sizing: border-box; }

        .btn-borrar-card { position: absolute; top: 10px; right: 10px; background: rgba(255, 0, 0, 0.8); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 10; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
        .modal-content { background: #111; margin: 5% auto; padding: 40px; border: 1px solid var(--color-mostaza); width: 85%; max-width: 1000px; border-radius: 10px; position: relative; }
        
        footer { text-align: center; padding: 40px; border-top: 2px solid var(--color-mostaza); background: #000; color: #aaa; margin-top: 0; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-minimal-brilla">
            <svg class="svg-carrito-dorado" viewBox="0 0 512 512">
                <path d="M472.1,348.6c13.7,0,24.8-11.1,24.8-24.8V188.2c0-13.7-11.1-24.8-24.8-24.8H188.2c-13.7,0-24.8,11.1-24.8,24.8v135.6c0,13.7,11.1,24.8,24.8,24.8h60v50H60c-13.7,0-24.8,11.1-24.8,24.8v50c0,13.7,11.1,24.8,24.8,24.8h400c13.7,0,24.8-11.1,24.8-24.8v-50c0-13.7-11.1-24.8-24.8-24.8h-70v-50C472.1,348.6,472.1,348.6,472.1,348.6z M188.2,188.2h283.9v135.6H188.2V188.2z M60,400h400v50H60V400z M273.9,348.6h100v50h-100V348.6z"/>
            </svg>
            <p class="text-brilla-nav">BRILLA</p>
            <p class="text-autospa-nav">AUTO SPA</p>
        </a>

        <div class="area-login-nav">
            <button id="btn-nueva-pub" onclick="document.getElementById('modal-crear').style.display='block'"><i class="fas fa-plus"></i> Nueva Publicación</button>
            <span id="user-greeting"></span>
            <button id="btn-admin-nav" onclick="document.getElementById('login-owner').style.display='flex'" style="background: transparent; color: var(--color-mostaza); border: 1px solid var(--color-mostaza); cursor: pointer; padding: 6px 12px; font-size: 11px; border-radius: 3px; font-weight: bold; text-transform: uppercase;">Owner</button>
        </div>
    </nav>

    <div class="hero">
        <h1>Servicio Premium</h1>
        <p>Brilla Auto Spa by Day Rojas</p>
    </div>

    <div class="seccion-autos">
        <h2 style="text-align:center; color:var(--color-mostaza); margin-bottom: 40px;">CATÁLOGO EXCLUSIVO</h2>
        <div id="grid-autos" class="contenedor-autos"></div>
    </div>

    <section style="background-color: var(--color-gris-oscuro); border-top: 1px solid var(--color-mostaza); padding: 50px 20px;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 40px;">
            <div style="flex: 1; min-width: 300px;">
                <h3 style="color: var(--color-mostaza); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px;">CONTACT US:</h3>
                <div style="display: flex; align-items: center; margin-bottom: 25px;">
                    <div class="hex-icon"><i class="fas fa-map-marker-alt" style="color: var(--color-mostaza);"></i></div>
                    <p style="margin: 0; color: white; font-size: 1.1rem;">Dumfries and surrounding areas</p>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="hex-icon"><i class="fas fa-envelope" style="color: var(--color-mostaza);"></i></div>
                    <p style="margin: 0; color: white; font-size: 1.1rem;">brillautospa@gmail.com</p>
                </div>
            </div>
            <div class="banner-promo">
                <h2 style="margin: 0; font-size: 1.8rem; font-weight: bold;">Get $15 OFF your first full detail service!</h2>
            </div>
        </div>
    </section>

    <div id="modal-crear" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--color-mostaza);">Nueva Publicación</h2>
            <div class="form-crear">
                <div style="grid-column: span 2;">
                    <label>Imágenes (puedes seleccionar varias)</label>
                    <input type="file" id="new-fotos" multiple accept="image/*">
                </div>
                <div style="grid-column: span 2;"><label>Título</label><input type="text" id="new-titulo"></div>
                <div style="grid-column: span 2;"><label>Descripción</label><textarea id="new-desc" rows="3"></textarea></div>
                <div><label>Precio</label><input type="text" id="new-precio"></div>
                <div><label>Año</label><input type="text" id="new-modelo"></div>
                <div><label>Motor</label><input type="text" id="new-motor"></div>
                <div><label>Potencia</label><input type="text" id="new-potencia"></div>
            </div>
            <button onclick="crearPublicacion()" style="width:100%; margin-top:20px; background:var(--color-mostaza); padding:15px; border:none; font-weight:bold; cursor:pointer;">PUBLICAR</button>
            <button onclick="document.getElementById('modal-crear').style.display='none'" style="width:100%; margin-top:10px; background:transparent; color:white; border:none; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="modal-detalles" class="modal">
        <div class="modal-content">
            <span style="position:absolute; top:20px; right:30px; font-size:30px; cursor:pointer;" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div>

    <div id="login-owner" class="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--color-mostaza);">IDENTIFICACIÓN</h2>
            <input type="text" id="user-owner" placeholder="USUARIO">
            <input type="password" id="pass-owner" placeholder="CONTRASEÑA">
            <button onclick="validarAcceso()" style="background:var(--color-mostaza); color:black; border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer; border-radius:5px;">Entrar</button>
            <button onclick="document.getElementById('login-owner').style.display='none'" style="background:transparent; color:white; border:none; margin-top:10px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <footer><p>&copy; 2024 BRILLA AUTO SPA - Exclusividad y Calidad</p></footer>

    <script>
        let esOwner = false;
        let catalogo = JSON.parse(localStorage.getItem('brilla_vFinal_v2')) || {};

        async function crearPublicacion() {
            const files = document.getElementById('new-fotos').files;
            const promesas = Array.from(files).map(file => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });

            const fotosBase64 = await Promise.all(promesas);
            const id = "auto_" + Date.now();
            
            catalogo[id] = {
                titulo: document.getElementById('new-titulo').value,
                precio: document.getElementById('new-precio').value,
                descripcion: document.getElementById('new-desc').value,
                modelo: document.getElementById('new-modelo').value,
                motor: document.getElementById('new-motor').value,
                potencia: document.getElementById('new-potencia').value,
                fotos: fotosBase64.length > 0 ? fotosBase64 : ['https://via.placeholder.com/800x500?text=Sin+Imagen']
            };
            
            localStorage.setItem('brilla_vFinal_v2', JSON.stringify(catalogo));
            renderizar();
            document.getElementById('modal-crear').style.display = 'none';
        }

        function renderizar() {
            const grid = document.getElementById('grid-autos');
            grid.innerHTML = ""; 
            Object.keys(catalogo).reverse().forEach(id => {
                const auto = catalogo[id];
                const waUrl = `https://wa.me/1234567890?text=Hola, me interesa el ${auto.titulo}`;

                grid.innerHTML += `
                    <div class="tarjeta-auto animate__animated animate__fadeInUp">
                        ${esOwner ? `<button class="btn-borrar-card" onclick="borrar('${id}')">BORRAR</button>` : ''}
                        <img src="${auto.fotos[0]}" onclick="abrirDetalle('${id}')">
                        <div class="info-auto">
                            <p class="marca-modelo">${auto.titulo}</p>
                            <p style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">${auto.motor} | ${auto.modelo}</p>
                            <div class="card-action-row">
                                <div class="precio-auto">${auto.precio}</div>
                                <a href="${waUrl}" target="_blank" class="btn-wa-preview"><i class="fab fa-whatsapp"></i> ME INTERESA</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function abrirDetalle(id) {
            const auto = catalogo[id];
            let sliderHtml = `<div class="slider-fotos">`;
            auto.fotos.forEach(f => sliderHtml += `<img src="${f}">`);
            sliderHtml += `</div>`;

            document.getElementById('contenido-modal').innerHTML = `
                <h2 style="color:var(--color-mostaza);">${auto.titulo}</h2>
                ${sliderHtml}
                <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:30px; text-align:left;">
                    <div>
                        <h3 style="color:var(--color-mostaza);">Descripción</h3>
                        <p style="color:#ccc;">${auto.descripcion}</p>
                    </div>
                    <div style="background:#1a1a1a; padding:25px; border-radius:10px;">
                        <p><strong>Año:</strong> ${auto.modelo}</p>
                        <p><strong>Motor:</strong> ${auto.motor}</p>
                        <p><strong>Potencia:</strong> ${auto.potencia}</p>
                        <p style="font-size:2rem; color:var(--color-mostaza); font-weight:bold;">${auto.precio}</p>
                    </div>
                </div>`;
            document.getElementById('modal-detalles').style.display = 'block';
        }

        function borrar(id) {
            if(confirm("¿Vendido? ¿Eliminar publicación?")) {
                delete catalogo[id];
                localStorage.setItem('brilla_vFinal_v2', JSON.stringify(catalogo));
                renderizar();
            }
        }

        function validarAcceso() {
            if (document.getElementById('user-owner').value === "DAY ROJAS" && document.getElementById('pass-owner').value === "POTOMAC2026") {
                esOwner = true;
                document.getElementById('login-owner').style.display = 'none';
                document.getElementById('btn-nueva-pub').style.display = 'block';
                document.getElementById('user-greeting').innerHTML = "HOLA, DAY";
                document.getElementById('user-greeting').style.display = 'inline-block';
                document.getElementById('btn-admin-nav').style.display = 'none';
                renderizar();
            } else { alert("Clave Incorrecta"); }
        }

        renderizar();
    </script>
</body>
</html>
