<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilla Auto Spa | Catálogo de Exclusividad</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        :root {
            --color-mostaza: #d1b464;
            --color-negro: #000000;
            --color-gris-oscuro: #121212;
            --color-texto-blanco: #ffffff;
            --font-main: 'Georgia', serif;
        }

        body { font-family: var(--font-main); margin: 0; background-color: var(--color-negro); color: var(--color-texto-blanco); overflow-x: hidden; }

        nav {
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 3px solid var(--color-mostaza);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-text { font-weight: bold; font-size: 1.6rem; color: var(--color-mostaza); letter-spacing: 2px; }

        /* TARJETAS MEJORADAS */
        .seccion-autos { padding: 60px 20px; max-width: 1300px; margin: auto; }
        .contenedor-autos { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .tarjeta-auto { 
            background: var(--color-gris-oscuro); 
            border: 1px solid #333; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.4s;
            position: relative;
        }
        .tarjeta-auto:hover { transform: translateY(-10px); border-color: var(--color-mostaza); }
        
        .tarjeta-auto img { width: 100%; height: 230px; object-fit: cover; border-bottom: 2px solid var(--color-mostaza); }
        
        .info-auto { padding: 20px; }
        .marca-modelo { font-size: 1.4rem; color: var(--color-mostaza); margin-bottom: 8px; font-weight: bold; }
        
        /* ESTILO PARA LA VISTA PREVIA DE INFO */
        .preview-info { font-size: 0.85rem; color: #bbb; margin-bottom: 15px; line-height: 1.4; }
        .preview-tech { font-size: 0.8rem; color: var(--color-mostaza); border-top: 1px solid #333; padding-top: 10px; display: flex; align-items: center; gap: 10px; }

        .precio-auto { font-size: 1.6rem; font-weight: bold; margin-top: 15px; color: white; }

        /* BOTONES EDITAR */
        .btn-edit-inline { display: none; background: #000; color: var(--color-mostaza); border: 1px solid var(--color-mostaza); border-radius: 4px; padding: 3px 8px; font-size: 0.65rem; cursor: pointer; margin-left: 8px; }

        /* MODAL Y LOGIN (Igual que antes) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow: auto; }
        .modal-content { background: #111; margin: 5% auto; padding: 40px; border: 1px solid var(--color-mostaza); width: 85%; max-width: 900px; border-radius: 10px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 25px; font-size: 30px; cursor: pointer; color: #666; }
        .login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 3000; justify-content: center; align-items: center; }
        .login-box { background: #000; padding: 40px; border: 2px solid var(--color-mostaza); border-radius: 10px; text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid var(--color-mostaza); color: white; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">BRILLA AUTO SPA</div>
        <div>
            <span id="user-greeting" style="display:none; color:var(--color-mostaza); margin-right:15px;"></span>
            <button id="btn-admin-nav" onclick="document.getElementById('login-owner').style.display='flex'" style="background:transparent; color:var(--color-mostaza); border:1px solid var(--color-mostaza); cursor:pointer; padding:6px 12px; border-radius:3px;">ACCESO OWNER</button>
        </div>
    </nav>

    <div class="seccion-autos">
        <h2 style="text-align:center; color:var(--color-mostaza); margin-bottom: 40px;">CATÁLOGO DISPONIBLE</h2>
        <div id="grid-autos" class="contenedor-autos">
            </div>
    </div>

    <div id="modal-detalles" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div>

    <div id="login-owner" class="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--color-mostaza);">IDENTIFICACIÓN</h2>
            <input type="text" id="user-owner" placeholder="USUARIO">
            <input type="password" id="pass-owner" placeholder="CONTRASEÑA">
            <button onclick="validarAcceso()" style="background:var(--color-mostaza); border:none; padding:12px; width:100%; font-weight:bold; cursor:pointer;">ENTRAR</button>
            <p onclick="document.getElementById('login-owner').style.display='none'" style="color:#555; cursor:pointer; margin-top:15px;">Cerrar</p>
        </div>
    </div>

    <script>
        let esOwner = false;
        let autoActualId = "";

        const defaultCatalogo = {
            'corvette': { titulo: 'Chevrolet Corvette Z06', precio: '$150,000', descripcion: 'Detallado premium de 3 etapas con sellado cerámico.', modelo: '2024', motor: '5.5L LT6 V8 Supercharged', potencia: '670 HP' },
            'ferrari': { titulo: 'Ferrari F8 Tributo', precio: '$380,000', descripcion: 'Tratamiento de cuero premium e interior impecable.', modelo: '2023', motor: '3.9L Twin-Turbo V8', potencia: '710 HP' }
        };

        let catalogo = JSON.parse(localStorage.getItem('brilla_spa_v4')) || defaultCatalogo;

        function guardar() { localStorage.setItem('brilla_spa_v4', JSON.stringify(catalogo)); }

        // ESTA FUNCIÓN AHORA CREA LAS TARJETAS CON LA INFO EXTRA
        function renderizarCatalogo() {
            const grid = document.getElementById('grid-autos');
            grid.innerHTML = ""; 

            Object.keys(catalogo).forEach(id => {
                const auto = catalogo[id];
                const img = id === 'corvette' ? 'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800' : 'https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=800';
                
                grid.innerHTML += `
                    <div class="tarjeta-auto animate__animated animate__fadeInUp" onclick="abrirModal('${id}')">
                        <img src="${img}">
                        <div class="info-auto">
                            <p class="marca-modelo">${auto.titulo}</p>
                            <p class="preview-info">${auto.descripcion.substring(0, 70)}...</p>
                            <div class="preview-tech">
                                <span><i class="fas fa-engine"></i> ${auto.motor}</span>
                                <span><i class="fas fa-calendar"></i> ${auto.modelo}</span>
                            </div>
                            <div class="precio-auto">${auto.precio}</div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirModal(id) {
            autoActualId = id;
            const auto = catalogo[id];
            const displayEdit = esOwner ? 'inline-block' : 'none';

            document.getElementById('contenido-modal').innerHTML = `
                <h2 style="color: var(--color-mostaza); font-size: 2rem;">${auto.titulo} <button class="btn-edit-inline" style="display:${displayEdit}" onclick="editar('titulo')">EDITAR</button></h2>
                <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:30px;">
                    <div>
                        <h3 style="color:var(--color-mostaza);">Descripción <button class="btn-edit-inline" style="display:${displayEdit}" onclick="editar('descripcion')">EDITAR</button></h3>
                        <p>${auto.descripcion}</p>
                        <h3 style="color:white; margin-top:20px;">Precio <button class="btn-edit-inline" style="display:${displayEdit}" onclick="editar('precio')">EDITAR</button></h3>
                        <p style="font-size:2rem; color:var(--color-mostaza); font-weight:bold;">${auto.precio}</p>
                    </div>
                    <div style="background:#1a1a1a; padding:25px; border-radius:10px; border: 1px solid #333;">
                        <h3 style="margin-top:0; border-bottom:1px solid var(--color-mostaza);">Ficha Técnica</h3>
                        <p><strong>Modelo:</strong> ${auto.modelo} <button class="btn-edit-inline" style="display:${displayEdit}" onclick="editar('modelo')">EDITAR</button></p>
                        <p><strong>Motor:</strong> ${auto.motor} <button class="btn-edit-inline" style="display:${displayEdit}" onclick="editar('motor')">EDITAR</button></p>
                        <p><strong>Potencia:</strong> ${auto.potencia} <button class="btn-edit-inline" style="display:${displayEdit}" onclick="editar('potencia')">EDITAR</button></p>
                    </div>
                </div>
            `;
            document.getElementById('modal-detalles').style.display = 'block';
        }

        function editar(campo) {
            const nuevo = prompt("Nuevo valor para " + campo + ":", catalogo[autoActualId][campo]);
            if (nuevo) {
                catalogo[autoActualId][campo] = nuevo;
                guardar();
                renderizarCatalogo();
                abrirModal(autoActualId);
            }
        }

        function validarAcceso() {
            if (document.getElementById('user-owner').value === "DAY ROJAS" && document.getElementById('pass-owner').value === "POTOMAC2026") {
                esOwner = true;
                document.getElementById('login-owner').style.display = 'none';
                document.getElementById('user-greeting').innerText = "MODO OWNER: DAY ROJAS";
                document.getElementById('user-greeting').style.display = 'inline-block';
                document.getElementById('btn-admin-nav').style.display = 'none';
                renderizarCatalogo();
                alert("Acceso Autorizado.");
            } else { alert("Datos incorrectos"); }
        }

        function cerrarModal() { document.getElementById('modal-detalles').style.display = 'none'; }
        
        renderizarCatalogo();
    </script>
</body>
</html>
