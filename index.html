<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilla Auto Spa | Catálogo Premium</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MrJose21/cochesday/2fc9948b3ad68451d7661ea1d7c6692337e8bd41/logo%20de%20fondo.jpg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        :root {
            --color-mostaza: #d1b464;
            --color-negro: #000000;
            --color-gris-oscuro: #0a0a0a;
            --color-input: #151515;
            --color-texto: #ffffff;
            --font-main: 'Georgia', serif;
        }

        body { 
            font-family: var(--font-main); 
            margin: 0; 
            background-color: var(--color-negro); 
            color: var(--color-texto); 
            overflow-x: hidden; 
        }

        /* NAVEGACIÓN */
        nav {
            background: #000;
            border-bottom: 2px solid var(--color-mostaza);
            padding: 10px 30px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .nav-logo img { height: 50px; }
        .nav-buttons { display: flex; align-items: center; gap: 20px; }
        #user-greeting { display: none; color: var(--color-mostaza); font-weight: bold; font-size: 0.9rem; }
        
        .btn-gold-outline {
            background: transparent;
            color: var(--color-mostaza);
            border: 1px solid var(--color-mostaza);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
        }

        .btn-gold-fill {
            background: var(--color-mostaza);
            color: black;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            display: none;
        }

        .promo-bar {
            background: var(--color-mostaza);
            color: black;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            padding: 50px 20px;
            border-bottom: 1px solid #222;
        }
        .hero img { max-width: 450px; width: 100%; margin-bottom: 20px; }
        .hero h1 { font-size: 3rem; margin: 0; letter-spacing: 4px; }
        .hero p { color: var(--color-mostaza); font-size: 1.2rem; margin-top: 5px; }

        .services-strip {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #111;
        }
        .service-tag { color: #888; font-size: 0.75rem; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .service-tag i { color: var(--color-mostaza); }

        /* MODALES */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: var(--color-negro);
            width: 90%;
            max-width: 700px;
            border: 1px solid var(--color-mostaza);
            border-radius: 15px;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 20px rgba(209, 180, 100, 0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-box h2 {
            color: var(--color-mostaza);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .upload-area {
            border: 1px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--color-mostaza); }
        .upload-area i { font-size: 1.5rem; color: var(--color-mostaza); margin-bottom: 10px; display: block; }
        .upload-area p { font-size: 0.8rem; color: #777; margin: 0; }

        .form-label {
            display: block;
            color: var(--color-mostaza);
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: var(--color-input);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-confirm {
            background: var(--color-mostaza);
            color: black;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        /* CATÁLOGO */
        .container { padding: 50px 5%; }
        .grid-autos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--color-mostaza); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-bottom: 2px solid var(--color-mostaza); cursor: pointer; }
        .card-body { padding: 20px; }

        /* GALERÍA DETALLES */
        .detail-gallery { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; }
        .detail-gallery img { height: 200px; border-radius: 8px; border: 1px solid #222; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">
            <img src="https://raw.githubusercontent.com/MrJose21/cochesday/850bcbb51601be4a3a685ab1c271e31096074419/Brilla%20Auto%20Spa%20LOGO.png" alt="Logo">
        </div>
        <div class="nav-buttons">
            <span id="user-greeting"></span>
            <button id="btn-pub" class="btn-gold-fill" onclick="document.getElementById('modal-pub').style.display='flex'">+ PUBLICAR</button>
            <button id="btn-login" class="btn-gold-outline" onclick="document.getElementById('modal-login').style.display='flex'">OWNER</button>
        </div>
    </nav>

    <div class="promo-bar">GET $15 OFF YOUR FIRST FULL DETAIL SERVICE!</div>

    <div class="hero">
        <img src="https://raw.githubusercontent.com/MrJose21/cochesday/1a562aa7f60a3f2cea6a5107fc5a288a2d6195d0/Brilla_Auto_Spa_LOGO-removebg-preview.png" alt="Logo Hero">
        <h1>CATÁLOGO PREMIUM</h1>
        <p>Exclusividad por Day Rojas</p>
    </div>

    <div class="services-strip">
        <div class="service-tag"><i class="fas fa-tools"></i> Light Mechanical</div>
        <div class="service-tag"><i class="fas fa-broom"></i> Foam Wash</div>
        <div class="service-tag"><i class="fas fa-car"></i> Premium Wash</div>
        <div class="service-tag"><i class="fas fa-couch"></i> Full Interior</div>
        <div class="service-tag"><i class="fas fa-magic"></i> Full Detailed</div>
    </div>

    <div class="container">
        <h2 style="text-align: center; color: var(--color-mostaza); letter-spacing: 3px; margin-bottom: 40px;">VEHÍCULOS DISPONIBLES</h2>
        <div id="lista-autos" class="grid-autos"></div>
    </div>

    <div id="modal-pub" class="modal">
        <div class="modal-box">
            <span onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute; right:20px; top:15px; cursor:pointer; color:#555; font-size:25px;">&times;</span>
            <h2>NUEVA PUBLICACIÓN</h2>
            <div class="upload-area" onclick="document.getElementById('in-fotos').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="label-fotos">Selecciona fotos del vehículo</p>
                <input type="file" id="in-fotos" multiple accept="image/*" style="display:none;" onchange="actualizarLabel(this)">
            </div>
            <label class="form-label">Nombre del Vehículo</label>
            <input type="text" id="in-titulo" class="form-input">
            <label class="form-label">Descripción</label>
            <textarea id="in-desc" class="form-input" rows="3"></textarea>
            <div class="grid-inputs">
                <div><label class="form-label">Precio</label><input type="text" id="in-precio" class="form-input"></div>
                <div><label class="form-label">Año</label><input type="text" id="in-anio" class="form-input"></div>
            </div>
            <div class="grid-inputs">
                <div><label class="form-label">Motor</label><input type="text" id="in-motor" class="form-input"></div>
                <div><label class="form-label">Potencia</label><input type="text" id="in-potencia" class="form-input"></div>
            </div>
            <button class="btn-confirm" onclick="guardarAuto()">CONFIRMAR Y PUBLICAR</button>
        </div>
    </div>

    <div id="modal-detalles" class="modal">
        <div class="modal-box">
            <span onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute; right:20px; top:15px; cursor:pointer; color:#555; font-size:25px;">&times;</span>
            <div id="detalle-contenido"></div>
        </div>
    </div>

    <div id="modal-login" class="modal">
        <div class="modal-box" style="max-width: 400px;">
            <h2>ACCESO PANEL</h2>
            <input type="text" id="user" class="form-input" placeholder="USUARIO" style="text-align:center;">
            <input type="password" id="pass" class="form-input" placeholder="CONTRASEÑA" style="text-align:center;">
            <button class="btn-confirm" onclick="login()">ENTRAR</button>
            <p onclick="document.getElementById('modal-login').style.display='none'" style="text-align:center; color:#444; font-size:0.8rem; cursor:pointer; margin-top:15px;">CANCELAR</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD93sZGnjTLnRnWwbONPd7Xr00Ip_D3ODk",
            authDomain: "brillaautospa.firebaseapp.com",
            projectId: "brillaautospa",
            databaseURL: "https://brillaautospa-default-rtdb.firebaseio.com",
            storageBucket: "brillaautospa.firebasestorage.app",
            messagingSenderId: "774015478340",
            appId: "1:774015478340:web:c096f36482374bd72c6a11"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const autosRef = ref(db, 'autos');

        let esAdmin = false;

        // FUNCIONES GLOBALES PARA QUE EL HTML LAS VEA
        window.actualizarLabel = (input) => {
            document.getElementById('label-fotos').innerText = input.files.length + " fotos seleccionadas";
        };

        window.login = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "DAY ROJAS" && p === "POTOMAC2026") {
                esAdmin = true;
                document.getElementById('modal-login').style.display = 'none';
                document.getElementById('btn-login').style.display = 'none';
                document.getElementById('btn-pub').style.display = 'block';
                document.getElementById('user-greeting').innerText = "DAY ROJAS";
                document.getElementById('user-greeting').style.display = 'block';
                // El render se dispara solo por onValue
            } else { alert("Datos incorrectos"); }
        };

        window.guardarAuto = async () => {
            const files = document.getElementById('in-fotos').files;
            if(files.length === 0) return alert("Sube fotos");
            
            const promesas = Array.from(files).map(f => new Promise(res => {
                const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f);
            }));
            const fotosBase64 = await Promise.all(promesas);

            const nuevo = {
                titulo: document.getElementById('in-titulo').value || 'Sin título',
                desc: document.getElementById('in-desc').value || '',
                precio: document.getElementById('in-precio').value || 'Consultar',
                anio: document.getElementById('in-anio').value || '-',
                motor: document.getElementById('in-motor').value || '-',
                potencia: document.getElementById('in-potencia').value || '-',
                fotos: fotosBase64,
                fecha: Date.now()
            };

            push(autosRef, nuevo);
            document.getElementById('modal-pub').style.display = 'none';
            // Limpiar formulario
            document.getElementById('in-titulo').value = "";
            document.getElementById('in-desc').value = "";
            document.getElementById('in-precio').value = "";
            document.getElementById('in-anio').value = "";
            document.getElementById('in-motor').value = "";
            document.getElementById('in-potencia').value = "";
            document.getElementById('label-fotos').innerText = "Selecciona fotos del vehículo";
        };

        // CARGA EN TIEMPO REAL DESDE FIREBASE
        onValue(autosRef, (snapshot) => {
            const lista = document.getElementById('lista-autos');
            lista.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.keys(data).forEach(key => {
                    const a = data[key];
                    lista.innerHTML += `
                        <div class="card animate__animated animate__fadeIn">
                            <img src="${a.fotos[0]}" onclick="verDetalles('${key}')">
                            <div class="card-body">
                                <h3 style="color:var(--color-mostaza); margin:0;">${a.titulo}</h3>
                                <p style="font-size:0.8rem; color:#666;">${a.motor} | ${a.anio}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                                    <span style="font-weight:bold; color:white;">${a.precio}</span>
                                    <button class="btn-gold-outline" onclick="verDetalles('${key}')" style="font-size:9px;">VER DETALLES</button>
                                </div>
                                ${esAdmin ? `<button onclick="borrar('${key}')" style="background:#ff4444; color:white; border:none; margin-top:10px; width:100%; padding:8px; border-radius:4px; cursor:pointer; font-size:10px; font-weight:bold;">ELIMINAR PUBLICACIÓN</button>` : ''}
                            </div>
                        </div>
                    `;
                });
            }
        });

        window.verDetalles = (key) => {
            onValue(ref(db, 'autos/' + key), (snapshot) => {
                const auto = snapshot.val();
                const contenido = document.getElementById('detalle-contenido');
                contenido.innerHTML = `
                    <h2 style="color:var(--color-mostaza);">${auto.titulo}</h2>
                    <div class="detail-gallery">
                        ${auto.fotos.map(f => `<img src="${f}">`).join('')}
                    </div>
                    <p style="color:#ccc; line-height:1.5;">${auto.desc}</p>
                    <div style="background:#111; padding:20px; border-radius:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                        <p><b>Año:</b> ${auto.anio}</p>
                        <p><b>Motor:</b> ${auto.motor}</p>
                        <p><b>Potencia:</b> ${auto.potencia}</p>
                        <p style="color:var(--color-mostaza); font-size:1.2rem;"><b>${auto.precio}</b></p>
                    </div>
                    <a href="https://wa.me/15716600734" target="_blank" style="display:block; text-align:center; background:#25d366; color:white; text-decoration:none; padding:15px; border-radius:8px; margin-top:20px; font-weight:bold;">CONTACTAR POR WHATSAPP</a>
                `;
                document.getElementById('modal-detalles').style.display = 'flex';
            }, { onlyOnce: true });
        };

        window.borrar = (key) => {
            if(confirm("¿Estás seguro de eliminar este vehículo del catálogo?")) {
                remove(ref(db, 'autos/' + key));
            }
        };
    </script>
</body>
</html>
