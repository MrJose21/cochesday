<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilla Auto Spa | Catálogo de Exclusividad</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        :root {
            --color-mostaza: #d1b464;
            --color-negro: #000000;
            --color-gris-oscuro: #121212;
            --color-gris-input: #1e1e1e;
            --color-texto-blanco: #ffffff;
            --font-main: 'Georgia', serif;
            --shadow-gold: 0 0 15px rgba(209, 180, 100, 0.2);
        }

        body { font-family: var(--font-main); margin: 0; background-color: var(--color-negro); color: var(--color-texto-blanco); overflow-x: hidden; }

        /* NAV */
        nav {
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 3px solid var(--color-mostaza);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-minimal-brilla {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; text-decoration: none; filter: drop-shadow(0 0 5px rgba(209, 180, 100, 0.4));
        }

        .svg-carrito-dorado { fill: var(--color-mostaza); width: 50px; height: auto; }
        .text-brilla-nav { font-size: 1.1rem; color: var(--color-mostaza); font-weight: bold; letter-spacing: 1px; margin: 0; font-family: 'Times New Roman', Times, serif; }
        .text-autospa-nav { font-size: 0.6rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin: -2px 0 0 0; }

        .area-login-nav { display: flex; align-items: center; gap: 15px; }
        #user-greeting { display: none; color: var(--color-mostaza); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; border-right: 1px solid #333; padding-right: 15px; }
        
        #btn-nueva-pub { 
            display: none; background: var(--color-mostaza); color: black; border: none; 
            padding: 8px 16px; font-size: 11px; border-radius: 4px; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        #btn-nueva-pub:hover { transform: scale(1.05); box-shadow: var(--shadow-gold); }

        .promo-banner {
            background-color: var(--color-mostaza); color: #000; padding: 12px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            font-weight: bold; font-size: 0.9rem; text-align: center;
        }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center;
            height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 1px solid var(--color-mostaza);
        }

        /* MODALES Y LOGIN CENTRADOS */
        .modal, .login-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 2000; 
            backdrop-filter: blur(5px);
            justify-content: center; 
            align-items: center;
        }

        .modal-content, .login-box { 
            background: #0a0a0a; 
            padding: 35px; 
            border: 1px solid var(--color-mostaza); 
            width: 90%; 
            max-width: 650px; 
            border-radius: 15px; 
            position: relative;
            box-shadow: var(--shadow-gold);
            max-height: 90vh;
            overflow-y: auto;
        }

        .login-box { max-width: 350px; text-align: center; }

        /* FORMULARIO */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        .input-group { display: flex; flex-direction: column; gap: 5px; text-align: left; }
        .input-group label { color: var(--color-mostaza); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .form-control { 
            background: var(--color-gris-input); 
            border: 1px solid #333; 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .login-box input { margin-bottom: 15px; text-align: center; }

        /* CARGA DE ARCHIVOS */
        .file-upload-wrapper {
            border: 2px dashed #444; padding: 25px; text-align: center; border-radius: 10px;
            cursor: pointer; transition: 0.3s; background: #111;
        }
        .file-upload-wrapper:hover { border-color: var(--color-mostaza); background: #151515; }
        .file-upload-wrapper i { font-size: 1.5rem; color: var(--color-mostaza); margin-bottom: 10px; }

        .btn-principal { 
            background: var(--color-mostaza); color: black; border: none; padding: 14px; 
            border-radius: 8px; font-weight: bold; text-transform: uppercase; 
            width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-principal:hover { background: #e2c575; transform: scale(1.02); }

        .close-btn { position: absolute; top: 15px; right: 15px; color: #555; font-size: 22px; cursor: pointer; }

        /* CATALOGO */
        .seccion-autos { padding: 50px 5%; }
        .contenedor-autos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .tarjeta-auto { background: var(--color-gris-oscuro); border: 1px solid #222; border-radius: 12px; overflow: hidden; position: relative; }
        .tarjeta-auto img { width: 100%; height: 220px; object-fit: cover; border-bottom: 2px solid var(--color-mostaza); }
        .info-auto { padding: 15px; }
        
        /* CONTACTO */
        .contact-info-bar { padding: 40px; background: #080808; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; border-top: 1px solid #111; }
        .contact-item { display: flex; align-items: center; gap: 10px; }
        .hex-icon { width: 35px; height: 35px; border: 1px solid var(--color-mostaza); display: flex; align-items: center; justify-content: center; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); color: var(--color-mostaza); }
        
        .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; flex-direction:column; justify-content:center; align-items:center; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--color-mostaza); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen" class="loading-overlay"><div class="loader"></div><h3 id="loading-text" style="color:var(--color-mostaza)">VERIFICANDO...</h3></div>

    <nav>
        <a href="#" class="logo-minimal-brilla">
            <svg class="svg-carrito-dorado" viewBox="0 0 512 512"><path d="M472.1,348.6c13.7,0,24.8-11.1,24.8-24.8V188.2c0-13.7-11.1-24.8-24.8-24.8H188.2c-13.7,0-24.8,11.1-24.8,24.8v135.6c0,13.7,11.1,24.8,24.8,24.8h60v50H60c-13.7,0-24.8,11.1-24.8,24.8v50c0,13.7,11.1,24.8,24.8,24.8h400c13.7,0,24.8-11.1,24.8-24.8v-50c0-13.7-11.1-24.8-24.8-24.8h-70v-50C472.1,348.6,472.1,348.6,472.1,348.6z M188.2,188.2h283.9v135.6H188.2V188.2z M60,400h400v50H60V400z M273.9,348.6h100v50h-100V348.6z"/></svg>
            <p class="text-brilla-nav">BRILLA</p><p class="text-autospa-nav">AUTO SPA</p>
        </a>
        <div class="area-login-nav">
            <span id="user-greeting"></span>
            <button id="btn-nueva-pub" onclick="document.getElementById('modal-crear').style.display='flex'"><i class="fas fa-plus"></i> Publicar</button>
            <button id="btn-admin-nav" onclick="document.getElementById('login-owner').style.display='flex'" style="background:transparent; color:var(--color-mostaza); border:1px solid var(--color-mostaza); cursor:pointer; padding:6px 12px; border-radius:3px; font-weight:bold; font-size:10px;">OWNER</button>
        </div>
    </nav>

    <div class="promo-banner"><span>GET $15 OFF YOUR FIRST FULL DETAIL SERVICE!</span></div>

    <div class="hero">
        <h1 class="animate__animated animate__fadeInDown">Catálogo Premium</h1>
        <p>Exclusividad por Day Rojas</p>
    </div>

    <div class="seccion-autos"><div id="grid-autos" class="contenedor-autos"></div></div>

    <div id="modal-crear" class="modal">
        <div class="modal-content animate__animated animate__zoomIn">
            <span class="close-btn" onclick="document.getElementById('modal-crear').style.display='none'">&times;</span>
            <h2 style="color:var(--color-mostaza); text-align:center; margin:0 0 20px 0;">NUEVA PUBLICACIÓN</h2>
            <div class="form-grid">
                <div class="full-width">
                    <div class="file-upload-wrapper" onclick="document.getElementById('new-fotos').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p id="file-label" style="margin:0; font-size:0.8rem; color:#888;">Selecciona fotos del vehículo</p>
                        <input type="file" id="new-fotos" multiple accept="image/*" onchange="actualizarLabelArchivos(this)" style="display:none;">
                    </div>
                </div>
                <div class="input-group full-width"><label>Nombre del Vehículo</label><input type="text" id="new-titulo" class="form-control"></div>
                <div class="input-group full-width"><label>Descripción</label><textarea id="new-desc" class="form-control" rows="2"></textarea></div>
                <div class="input-group"><label>Precio</label><input type="text" id="new-precio" class="form-control"></div>
                <div class="input-group"><label>Año</label><input type="text" id="new-modelo" class="form-control"></div>
                <div class="input-group"><label>Motor</label><input type="text" id="new-motor" class="form-control"></div>
                <div class="input-group"><label>Potencia</label><input type="text" id="new-potencia" class="form-control"></div>
            </div>
            <button onclick="crearPublicacion()" class="btn-principal">CONFIRMAR Y PUBLICAR</button>
        </div>
    </div>

    <div id="login-owner" class="login-overlay">
        <div class="login-box animate__animated animate__fadeIn">
            <h2 style="color:var(--color-mostaza); margin-bottom:20px;">ACCESO PANEL</h2>
            <input type="text" id="user-owner" class="form-control" placeholder="USUARIO">
            <input type="password" id="pass-owner" class="form-control" placeholder="CONTRASEÑA">
            <button onclick="validarAcceso()" class="btn-principal">ENTRAR</button>
            <p onclick="document.getElementById('login-owner').style.display='none'" style="color:#555; cursor:pointer; margin-top:15px; font-size:0.8rem;">CANCELAR</p>
        </div>
    </div>

    <div id="modal-detalles" class="modal">
        <div class="modal-content"><span class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">&times;</span><div id="contenido-modal"></div></div>
    </div>

    <div class="contact-info-bar">
        <div class="contact-item"><div class="hex-icon"><i class="fas fa-envelope"></i></div><p style="margin:0; font-size:0.8rem;">brillautospa@gmail.com</p></div>
        <div class="contact-item"><div class="hex-icon"><i class="fab fa-whatsapp"></i></div><p style="margin:0; font-size:0.8rem;">?????</p></div>
    </div>

    <footer style="text-align:center; padding:30px; color:#444; font-size:0.8rem;">&copy; 2024 BRILLA AUTO SPA</footer>

    <script>
        let esOwner = false;
        let catalogo = JSON.parse(localStorage.getItem('brilla_vFinal_v2')) || {};

        function actualizarLabelArchivos(input) {
            const label = document.getElementById('file-label');
            label.innerHTML = input.files.length > 0 ? `<b style="color:var(--color-mostaza)">${input.files.length} seleccionadas</b>` : 'Selecciona fotos';
        }

        function validarAcceso() {
            const u = document.getElementById('user-owner').value;
            const p = document.getElementById('pass-owner').value;
            const loading = document.getElementById('loading-screen');
            loading.style.display = 'flex';
            
            setTimeout(() => {
                if (u === "DAY ROJAS" && p === "POTOMAC2026") {
                    esOwner = true;
                    loading.style.display = 'none';
                    document.getElementById('login-owner').style.display = 'none';
                    document.getElementById('btn-nueva-pub').style.display = 'block';
                    document.getElementById('user-greeting').innerText = "DAY ROJAS";
                    document.getElementById('user-greeting').style.display = 'inline-block';
                    document.getElementById('btn-admin-nav').style.display = 'none';
                    renderizar();
                } else {
                    loading.style.display = 'none';
                    alert("Error de acceso");
                }
            }, 1000);
        }

        async function crearPublicacion() {
            const files = document.getElementById('new-fotos').files;
            if(files.length === 0) return alert("Sube fotos");
            const promesas = Array.from(files).map(f => new Promise(res => {
                const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f);
            }));
            const fotos = await Promise.all(promesas);
            const id = "auto_" + Date.now();
            catalogo[id] = {
                titulo: document.getElementById('new-titulo').value || 'Sin Título',
                precio: document.getElementById('new-precio').value || '-',
                descripcion: document.getElementById('new-desc').value || '',
                modelo: document.getElementById('new-modelo').value || '-',
                motor: document.getElementById('new-motor').value || '-',
                potencia: document.getElementById('new-potencia').value || '-',
                fotos: fotos
            };
            localStorage.setItem('brilla_vFinal_v2', JSON.stringify(catalogo));
            renderizar();
            document.getElementById('modal-crear').style.display = 'none';
        }

        function renderizar() {
            const grid = document.getElementById('grid-autos');
            grid.innerHTML = ""; 
            Object.keys(catalogo).reverse().forEach(id => {
                const auto = catalogo[id];
                grid.innerHTML += `
                    <div class="tarjeta-auto">
                        ${esOwner ? `<button onclick="borrar('${id}')" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:9px; cursor:pointer; z-index:10;">BORRAR</button>` : ''}
                        <img src="${auto.fotos[0]}" onclick="abrirDetalle('${id}')">
                        <div class="info-auto">
                            <h3 style="color:var(--color-mostaza); margin:0;">${auto.titulo}</h3>
                            <p style="color:#666; font-size:0.75rem;">${auto.descripcion.substring(0,50)}...</p>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                                <span style="font-weight:bold;">${auto.precio}</span>
                                <a href="https://wa.me/17034731804" style="background:#25d366; color:white; padding:5px 10px; border-radius:5px; text-decoration:none; font-size:0.7rem;">INFO</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function abrirDetalle(id) {
            const auto = catalogo[id];
            document.getElementById('contenido-modal').innerHTML = `
                <h2 style="color:var(--color-mostaza);">${auto.titulo}</h2>
                <div style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;">
                    ${auto.fotos.map(f => `<img src="${f}" style="height:250px; border-radius:8px;">`).join('')}
                </div>
                <p>${auto.descripcion}</p>
                <div style="background:#111; padding:15px; border-radius:8px; display:grid; grid-template-columns:1fr 1fr; font-size:0.85rem;">
                    <p><b>Año:</b> ${auto.modelo}</p><p><b>Motor:</b> ${auto.motor}</p>
                    <p><b>Potencia:</b> ${auto.potencia}</p><p style="color:var(--color-mostaza); font-size:1.2rem;"><b>${auto.precio}</b></p>
                </div>`;
            document.getElementById('modal-detalles').style.display = 'flex';
        }

        function borrar(id) { if(confirm("¿Eliminar?")) { delete catalogo[id]; localStorage.setItem('brilla_vFinal_v2', JSON.stringify(catalogo)); renderizar(); } }
        renderizar();
    </script>
</body>
</html>
