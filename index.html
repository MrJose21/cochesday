<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brilla Auto Spa | Catálogo de Exclusividad</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <style>
        :root {
            --color-mostaza: #d1b464;
            --color-negro: #000000;
            --color-gris-oscuro: #121212;
            --color-gris-input: #1e1e1e;
            --color-texto-blanco: #ffffff;
            --font-main: 'Georgia', serif;
            --shadow-gold: 0 0 15px rgba(209, 180, 100, 0.2);
        }

        body { font-family: var(--font-main); margin: 0; background-color: var(--color-negro); color: var(--color-texto-blanco); overflow-x: hidden; }

        /* NAV ESTILO ORIGINAL */
        nav {
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 3px solid var(--color-mostaza);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-minimal-brilla {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer; text-decoration: none; filter: drop-shadow(0 0 5px rgba(209, 180, 100, 0.4));
        }

        .svg-carrito-dorado { fill: var(--color-mostaza); width: 50px; height: auto; }
        .text-brilla-nav { font-size: 1.1rem; color: var(--color-mostaza); font-weight: bold; letter-spacing: 1px; margin: 0; font-family: 'Times New Roman', Times, serif; }
        .text-autospa-nav { font-size: 0.6rem; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin: -2px 0 0 0; }

        .area-login-nav { display: flex; align-items: center; gap: 15px; }
        #user-greeting { display: none; color: var(--color-mostaza); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; border-right: 1px solid #333; padding-right: 15px; }
        
        #btn-nueva-pub { 
            display: none; background: var(--color-mostaza); color: black; border: none; 
            padding: 8px 16px; font-size: 11px; border-radius: 4px; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        #btn-nueva-pub:hover { transform: scale(1.05); box-shadow: var(--shadow-gold); }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center;
            height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 1px solid var(--color-mostaza);
        }
        .hero h1 { font-size: 3rem; text-transform: uppercase; margin: 0; }
        .hero p { color: var(--color-mostaza); letter-spacing: 2px; }

        /* CATALOGO */
        .seccion-autos { padding: 60px 20px; max-width: 1300px; margin: auto; }
        .contenedor-autos { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .tarjeta-auto { background: var(--color-gris-oscuro); border: 1px solid #333; border-radius: 12px; overflow: hidden; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .tarjeta-auto:hover { transform: translateY(-10px); border-color: var(--color-mostaza); box-shadow: 0 10px 20px rgba(209, 180, 100, 0.1); }
        .tarjeta-auto img { width: 100%; height: 230px; object-fit: cover; border-bottom: 2px solid var(--color-mostaza); cursor: pointer; }
        
        .info-auto { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .marca-modelo { font-size: 1.4rem; color: var(--color-mostaza); margin-bottom: 8px; font-weight: bold; }
        
        .card-action-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid #222; }
        .btn-wa-preview { background: #25d366; color: white; border: none; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* MODALES DISEÑO PROFESIONAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; backdrop-filter: blur(5px); }
        .modal-content { 
            background: #0a0a0a; margin: 2% auto; padding: 40px; border: 1px solid #333; 
            width: 90%; max-width: 800px; border-radius: 15px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        /* ESTILO DE FORMULARIO MEJORADO */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .full-width { grid-column: span 2; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { color: var(--color-mostaza); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        
        .form-control {
            background: var(--color-gris-input); border: 1px solid #333; color: white;
            padding: 12px 15px; border-radius: 8px; font-family: 'Arial', sans-serif;
            transition: 0.3s; outline: none;
        }
        .form-control:focus { border-color: var(--color-mostaza); background: #252525; box-shadow: 0 0 8px rgba(209, 180, 100, 0.1); }

        /* CARGA DE ARCHIVOS ESTILIZADA */
        .file-upload-wrapper {
            border: 2px dashed #333; padding: 30px; text-align: center; border-radius: 10px;
            cursor: pointer; transition: 0.3s; background: #111;
        }
        .file-upload-wrapper:hover { border-color: var(--color-mostaza); background: #151515; }
        .file-upload-wrapper i { font-size: 2rem; color: var(--color-mostaza); margin-bottom: 10px; }
        #new-fotos { display: none; }

        /* GALERIA MODAL */
        .slider-fotos { display: flex; overflow-x: auto; gap: 10px; scroll-snap-type: x mandatory; margin-bottom: 20px; padding-bottom: 10px; }
        .slider-fotos img { height: 400px; scroll-snap-align: center; border-radius: 8px; border: 1px solid #333; }

        /* BOTONES */
        .btn-principal {
            background: var(--color-mostaza); color: black; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; text-transform: uppercase; width: 100%;
            cursor: pointer; margin-top: 20px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-principal:hover { background: #e2c575; transform: translateY(-2px); }

        .close-btn { position: absolute; top: 20px; right: 20px; color: #555; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: white; }

        /* LOGIN */
        .login-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 3000; justify-content: center; align-items: center; }
        .login-box { background: #000; padding: 40px; border: 2px solid var(--color-mostaza); border-radius: 10px; text-align: center; width: 320px; box-shadow: var(--shadow-gold); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid var(--color-mostaza); color: white; border-radius: 5px; box-sizing: border-box; outline: none; }

        .btn-borrar-card { position: absolute; top: 10px; right: 10px; background: rgba(255, 0, 0, 0.8); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 10; }
        
        footer { text-align: center; padding: 40px; border-top: 2px solid var(--color-mostaza); background: #000; color: #aaa; margin-top: 0; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-minimal-brilla">
            <svg class="svg-carrito-dorado" viewBox="0 0 512 512">
                <path d="M472.1,348.6c13.7,0,24.8-11.1,24.8-24.8V188.2c0-13.7-11.1-24.8-24.8-24.8H188.2c-13.7,0-24.8,11.1-24.8,24.8v135.6c0,13.7,11.1,24.8,24.8,24.8h60v50H60c-13.7,0-24.8,11.1-24.8,24.8v50c0,13.7,11.1,24.8,24.8,24.8h400c13.7,0,24.8-11.1,24.8-24.8v-50c0-13.7-11.1-24.8-24.8-24.8h-70v-50C472.1,348.6,472.1,348.6,472.1,348.6z M188.2,188.2h283.9v135.6H188.2V188.2z M60,400h400v50H60V400z M273.9,348.6h100v50h-100V348.6z"/>
            </svg>
            <p class="text-brilla-nav">BRILLA</p>
            <p class="text-autospa-nav">AUTO SPA</p>
        </a>

        <div class="area-login-nav">
            <span id="user-greeting"></span>
            <button id="btn-nueva-pub" onclick="document.getElementById('modal-crear').style.display='block'"><i class="fas fa-plus"></i> Publicar</button>
            <button id="btn-admin-nav" onclick="document.getElementById('login-owner').style.display='flex'" style="background: transparent; color: var(--color-mostaza); border: 1px solid var(--color-mostaza); cursor: pointer; padding: 6px 12px; font-size: 11px; border-radius: 3px; font-weight: bold; text-transform: uppercase;">Owner</button>
        </div>
    </nav>

    <div class="hero">
        <h1 class="animate__animated animate__fadeInDown">Catálogo Premium</h1>
        <p class="animate__animated animate__fadeInUp animate__delay-1s">Brilla Auto Spa by Day Rojas</p>
    </div>

    <div class="seccion-autos">
        <h2 style="text-align:center; color:var(--color-mostaza); margin-bottom: 40px; letter-spacing: 4px;">EXCLUSIVIDAD EN CADA DETALLE</h2>
        <div id="grid-autos" class="contenedor-autos"></div>
    </div>

    <div id="modal-crear" class="modal">
        <div class="modal-content animate__animated animate__zoomIn">
            <span class="close-btn" onclick="document.getElementById('modal-crear').style.display='none'">&times;</span>
            <h2 style="color:var(--color-mostaza); margin:0; font-family: serif;">NUEVA PUBLICACIÓN</h2>
            <p style="color: #666; font-size: 0.8rem; margin-top: 5px;">Complete los datos para añadir al catálogo.</p>
            
            <div class="form-grid">
                <div class="full-width">
                    <div class="file-upload-wrapper" onclick="document.getElementById('new-fotos').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p id="file-label" style="margin:0; font-size: 0.9rem;">Haz clic para seleccionar las fotos del vehículo</p>
                        <input type="file" id="new-fotos" multiple accept="image/*" onchange="actualizarLabelArchivos(this)">
                    </div>
                </div>

                <div class="input-group full-width">
                    <label>Nombre del Vehículo</label>
                    <input type="text" id="new-titulo" class="form-control" placeholder="Ej: Mercedes-Benz G63 AMG">
                </div>

                <div class="input-group full-width">
                    <label>Descripción del Trabajo / Vehículo</label>
                    <textarea id="new-desc" class="form-control" rows="3" placeholder="Detalla los servicios realizados..."></textarea>
                </div>

                <div class="input-group">
                    <label>Precio ($)</label>
                    <input type="text" id="new-precio" class="form-control" placeholder="0.00">
                </div>

                <div class="input-group">
                    <label>Año / Modelo</label>
                    <input type="text" id="new-modelo" class="form-control" placeholder="2024">
                </div>

                <div class="input-group">
                    <label>Motor</label>
                    <input type="text" id="new-motor" class="form-control" placeholder="V8 Biturbo">
                </div>

                <div class="input-group">
                    <label>Potencia</label>
                    <input type="text" id="new-potencia" class="form-control" placeholder="585 HP">
                </div>
            </div>

            <button onclick="crearPublicacion()" class="btn-principal">CONFIRMAR Y PUBLICAR</button>
        </div>
    </div>

    <div id="modal-detalles" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div>

    <div id="login-owner" class="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--color-mostaza); margin-bottom: 25px;">ACCESO PANEL</h2>
            <input type="text" id="user-owner" placeholder="USUARIO">
            <input type="password" id="pass-owner" placeholder="CONTRASEÑA">
            <button onclick="validarAcceso()" class="btn-principal" style="margin-top:10px">ENTRAR</button>
            <p onclick="document.getElementById('login-owner').style.display='none'" style="color:#555; cursor:pointer; font-size:0.8rem; margin-top:15px;">CANCELAR</p>
        </div>
    </div>

    <footer><p>&copy; 2024 BRILLA AUTO SPA - Exclusividad y Calidad</p></footer>

    <script>
        let esOwner = false;
        let catalogo = JSON.parse(localStorage.getItem('brilla_vFinal_v2')) || {};

        function actualizarLabelArchivos(input) {
            const label = document.getElementById('file-label');
            if(input.files.length > 0) {
                label.innerHTML = `<b style="color:var(--color-mostaza)">${input.files.length} archivos seleccionados</b>`;
            }
        }

        async function crearPublicacion() {
            const files = document.getElementById('new-fotos').files;
            if(files.length === 0) { alert("Por favor, sube al menos una foto."); return; }

            const promesas = Array.from(files).map(file => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });

            const fotosBase64 = await Promise.all(promesas);
            const id = "auto_" + Date.now();
            
            catalogo[id] = {
                titulo: document.getElementById('new-titulo').value || 'Sin Título',
                precio: document.getElementById('new-precio').value || 'Consultar',
                descripcion: document.getElementById('new-desc').value || '',
                modelo: document.getElementById('new-modelo').value || '-',
                motor: document.getElementById('new-motor').value || '-',
                potencia: document.getElementById('new-potencia').value || '-',
                fotos: fotosBase64
            };
            
            localStorage.setItem('brilla_vFinal_v2', JSON.stringify(catalogo));
            renderizar();
            document.getElementById('modal-crear').style.display = 'none';
            limpiarFormulario();
        }

        function limpiarFormulario() {
            document.getElementById('new-titulo').value = '';
            document.getElementById('new-precio').value = '';
            document.getElementById('new-desc').value = '';
            document.getElementById('new-fotos').value = '';
            document.getElementById('file-label').innerText = 'Haz clic para seleccionar las fotos del vehículo';
        }

        function renderizar() {
            const grid = document.getElementById('grid-autos');
            grid.innerHTML = ""; 
            Object.keys(catalogo).reverse().forEach(id => {
                const auto = catalogo[id];
                const waUrl = `https://wa.me/17034731804?text=Hola Day, me interesa el ${auto.titulo}`;

                grid.innerHTML += `
                    <div class="tarjeta-auto animate__animated animate__fadeInUp">
                        ${esOwner ? `<button class="btn-borrar-card" onclick="borrar('${id}')">BORRAR</button>` : ''}
                        <img src="${auto.fotos[0]}" onclick="abrirDetalle('${id}')">
                        <div class="info-auto">
                            <p class="marca-modelo">${auto.titulo}</p>
                            <p style="font-size:0.8rem; color:#888; line-height:1.4">${auto.descripcion.substring(0, 60)}...</p>
                            <div class="card-action-row">
                                <div style="font-size:1.3rem; font-weight:bold;">${auto.precio}</div>
                                <a href="${waUrl}" target="_blank" class="btn-wa-preview"><i class="fab fa-whatsapp"></i> INFO</a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function abrirDetalle(id) {
            const auto = catalogo[id];
            let sliderHtml = `<div class="slider-fotos">`;
            auto.fotos.forEach(f => sliderHtml += `<img src="${f}">`);
            sliderHtml += `</div>`;

            document.getElementById('contenido-modal').innerHTML = `
                <h2 style="color:var(--color-mostaza); font-size:2rem; margin-bottom:15px;">${auto.titulo}</h2>
                ${sliderHtml}
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; text-align:left; margin-top:20px;">
                    <div>
                        <h3 style="color:var(--color-mostaza); font-size:0.9rem; text-transform:uppercase;">Descripción Detallada</h3>
                        <p style="color:#ccc; line-height:1.6;">${auto.descripcion}</p>
                    </div>
                    <div style="background:#151515; padding:20px; border-radius:10px; border:1px solid #222;">
                        <p style="margin:10px 0; border-bottom:1px solid #333; padding-bottom:5px;"><strong>Año:</strong> ${auto.modelo}</p>
                        <p style="margin:10px 0; border-bottom:1px solid #333; padding-bottom:5px;"><strong>Motor:</strong> ${auto.motor}</p>
                        <p style="margin:10px 0; border-bottom:1px solid #333; padding-bottom:5px;"><strong>Potencia:</strong> ${auto.potencia}</p>
                        <p style="font-size:2.2rem; color:var(--color-mostaza); font-weight:bold; margin-top:20px;">${auto.precio}</p>
                    </div>
                </div>`;
            document.getElementById('modal-detalles').style.display = 'block';
        }

        function borrar(id) {
            if(confirm("¿Vendido? ¿Eliminar publicación?")) {
                delete catalogo[id];
                localStorage.setItem('brilla_vFinal_v2', JSON.stringify(catalogo));
                renderizar();
            }
        }

        function validarAcceso() {
            const user = document.getElementById('user-owner').value;
            const pass = document.getElementById('pass-owner').value;
            if (user === "DAY ROJAS" && pass === "POTOMAC2026") {
                esOwner = true;
                document.getElementById('login-owner').style.display = 'none';
                document.getElementById('btn-nueva-pub').style.display = 'block';
                document.getElementById('user-greeting').innerHTML = "DAY ROJAS";
                document.getElementById('user-greeting').style.display = 'inline-block';
                document.getElementById('btn-admin-nav').style.display = 'none';
                renderizar();
            } else { alert("Datos Incorrectos"); }
        }

        renderizar();
    </script>
</body>
</html>
